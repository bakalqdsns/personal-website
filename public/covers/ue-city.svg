<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="ueBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#1a0a10"/>
    </linearGradient>
    <linearGradient id="ueAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>
    <filter id="ueGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="240" fill="url(#ueBg)"/>

  <!-- Grid -->
  <g stroke="#ff6b35" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
  </g>

  <!-- Low-poly city silhouette (left) -->
  <g fill="#ff6b35" fill-opacity="0.15" stroke="#ff6b35" stroke-opacity="0.3" stroke-width="0.5">
    <rect x="20" y="140" width="30" height="80"/>
    <rect x="55" y="110" width="25" height="110"/>
    <rect x="85" y="130" width="20" height="90"/>
    <rect x="30" y="155" width="18" height="65"/>
    <rect x="65" y="125" width="15" height="95"/>
  </g>

  <!-- Building windows (lit dots) -->
  <g fill="#ff6b35" fill-opacity="0.7">
    <rect x="27" y="148" width="4" height="4" rx="1"/>
    <rect x="34" y="148" width="4" height="4" rx="1"/>
    <rect x="27" y="156" width="4" height="4" rx="1"/>
    <rect x="34" y="163" width="4" height="4" rx="1"/>
    <rect x="27" y="170" width="4" height="4" rx="1"/>
    <rect x="62" y="118" width="4" height="4" rx="1"/>
    <rect x="70" y="125" width="4" height="4" rx="1"/>
    <rect x="62" y="132" width="4" height="4" rx="1"/>
    <rect x="70" y="139" width="4" height="4" rx="1"/>
    <rect x="62" y="146" width="4" height="4" rx="1"/>
  </g>

  <!-- Character platform / path -->
  <path d="M120,180 L200,160 L280,170 L350,145" stroke="#ff6b35" stroke-opacity="0.4" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Platform blocks -->
  <rect x="130" y="168" width="50" height="8" rx="2" fill="#ff6b35" fill-opacity="0.2" stroke="#ff6b35" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="200" y="158" width="60" height="8" rx="2" fill="#ff6b35" fill-opacity="0.2" stroke="#ff6b35" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="280" y="168" width="55" height="8" rx="2" fill="#ff6b35" fill-opacity="0.2" stroke="#ff6b35" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Player character (simple humanoid) -->
  <g filter="url(#ueGlow)">
    <circle cx="155" cy="152" r="6" fill="#ff6b35" fill-opacity="0.8"/>
    <rect x="150" y="159" width="10" height="14" rx="3" fill="#ff6b35" fill-opacity="0.6"/>
    <line x1="150" y1="163" x2="145" y2="170" stroke="#ff6b35" stroke-opacity="0.6" stroke-width="2"/>
    <line x1="160" y1="163" x2="165" y2="170" stroke="#ff6b35" stroke-opacity="0.6" stroke-width="2"/>
  </g>

  <!-- Enemy (red-ish) -->
  <g filter="url(#ueGlow)" fill="#ff4444" fill-opacity="0.7">
    <polygon points="310,138 318,150 302,150"/>
    <rect x="306" y="150" width="8" height="10" rx="2"/>
    <line x1="306" y1="153" x2="302" y2="158" stroke="#ff4444" stroke-opacity="0.6" stroke-width="1.5"/>
    <line x1="314" y1="153" x2="318" y2="158" stroke="#ff4444" stroke-opacity="0.6" stroke-width="1.5"/>
  </g>

  <!-- AI perception cone -->
  <path d="M310,145 L285,130 L285,160 Z" fill="#ff4444" fill-opacity="0.08" stroke="#ff4444" stroke-opacity="0.3" stroke-width="1"/>

  <!-- HUD elements -->
  <rect x="20" y="20" width="80" height="24" rx="4" fill="#ff6b35" fill-opacity="0.08" stroke="#ff6b35" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="35" font-family="monospace" font-size="7" fill="#ff6b35" fill-opacity="0.8" text-anchor="middle">HEALTH 100</text>

  <rect x="310" y="20" width="70" height="24" rx="4" fill="#ff6b35" fill-opacity="0.08" stroke="#ff6b35" stroke-opacity="0.3" stroke-width="1"/>
  <text x="345" y="35" font-family="monospace" font-size="7" fill="#ff6b35" fill-opacity="0.8" text-anchor="middle">SCORE 0</text>

  <!-- Glow top -->
  <rect x="0" y="0" width="400" height="60" fill="url(#ueAccent)"/>

  <!-- Label -->
  <text x="20" y="222" font-family="monospace" font-size="9" fill="#ff6b35" fill-opacity="0.6" letter-spacing="2">03 � URBAN ESCAPE</text>
  <text x="380" y="230" font-family="monospace" font-size="8" fill="#ff6b35" fill-opacity="0.3" text-anchor="end">2026</text>
</svg>
