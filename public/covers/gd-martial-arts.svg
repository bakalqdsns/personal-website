<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="kungfuBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#2a1500"/>
    </linearGradient>
    <radialGradient id="kungfuGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="240" fill="url(#kungfuBg)"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="90" rx="180" ry="120" fill="url(#kungfuGlow)"/>

  <!-- Traditional pattern - cloud scroll at top -->
  <g fill="none" stroke="#ffd700" stroke-opacity="0.08" stroke-width="1.5">
    <path d="M20,25 Q60,15 100,25 Q140,35 180,25 Q220,15 260,25 Q300,35 340,25 Q380,15 400,25"/>
    <path d="M0,35 Q40,25 80,35 Q120,45 160,35 Q200,25 240,35 Q280,45 320,35 Q360,25 400,35"/>
    <path d="M0,20 Q40,10 80,20 Q120,30 160,20 Q200,10 240,20 Q280,30 320,20 Q360,10 400,20"/>
  </g>

  <!-- Background mountains silhouette -->
  <g fill="#0a0500" fill-opacity="0.6">
    <polygon points="0,200 80,140 160,180 240,120 320,160 400,100 400,200"/>
    <polygon points="0,200 60,160 120,190 200,150 280,180 360,140 400,170 400,200"/>
  </g>

  <!-- Traditional martial arts figure silhouette (center-right) -->
  <g filter="url(#strongGlow)">
    <!-- Body -->
    <ellipse cx="260" cy="145" rx="18" ry="35" fill="#ff6b35" fill-opacity="0.15" stroke="#ff6b35" stroke-opacity="0.3" stroke-width="1"/>
    
    <!-- Head -->
    <circle cx="260" cy="100" r="12" fill="#ff6b35" fill-opacity="0.2" stroke="#ff6b35" stroke-opacity="0.4" stroke-width="1"/>
    
    <!-- Left arm extended (horse stance arm) -->
    <line x1="245" y1="130" x2="200" y2="110" stroke="#ff6b35" stroke-width="8" stroke-linecap="round" stroke-opacity="0.4"/>
    <line x1="245" y1="130" x2="200" y2="110" stroke="#ff8c00" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6"/>
    
    <!-- Right arm raised -->
    <line x1="275" y1="125" x2="310" y2="90" stroke="#ff6b35" stroke-width="8" stroke-linecap="round" stroke-opacity="0.4"/>
    <line x1="275" y1="125" x2="310" y2="90" stroke="#ff8c00" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6"/>
    
    <!-- Legs (horse stance) -->
    <line x1="250" y1="175" x2="220" y2="210" stroke="#ff6b35" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>
    <line x1="250" y1="175" x2="220" y2="210" stroke="#ff8c00" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="270" y1="175" x2="300" y2="210" stroke="#ff6b35" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>
    <line x1="270" y1="175" x2="300" y2="210" stroke="#ff8c00" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5"/>
    
    <!-- Fist/palm energy -->
    <circle cx="200" cy="105" r="6" fill="#ffd700" fill-opacity="0.3" stroke="#ffd700" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="315" cy="85" r="6" fill="#ffd700" fill-opacity="0.3" stroke="#ffd700" stroke-opacity="0.5" stroke-width="0.8"/>
  </g>

  <!-- Animated energy lines / motion trails -->
  <g stroke="#ffd700" stroke-width="1" fill="none" stroke-opacity="0.4">
    <path d="M195,100 Q180,90 175,80">
      <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M190,108 Q170,100 165,95">
      <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M320,80 Q335,70 345,65">
      <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Traditional Chinese character - martial -->
  <g filter="url(#softGlow)">
    <text x="80" y="140" font-family="'SimSun', 'STSong', serif" font-size="72" fill="none" stroke="#ffd700" stroke-opacity="0.12" stroke-width="1">武</text>
  </g>

  <!-- Dynamic motion lines -->
  <g stroke="#ff6b35" stroke-width="0.8" stroke-opacity="0.25">
    <line x1="170" y1="130" x2="140" y2="120"/>
    <line x1="175" y1="140" x2="145" y2="135"/>
    <line x1="180" y1="150" x2="150" y2="150"/>
    <line x1="330" y1="100" x2="355" y2="85"/>
    <line x1="325" y1="90" x2="350" y2="75"/>
  </g>

  <!-- Lanterns decoration (left) -->
  <g filter="url(#softGlow)">
    <line x1="50" y1="40" x2="50" y2="70" stroke="#8b4513" stroke-width="1.5"/>
    <ellipse cx="50" cy="85" rx="12" ry="15" fill="#8b0000" fill-opacity="0.4" stroke="#ffd700" stroke-opacity="0.3" stroke-width="0.8"/>
    <line x1="45" y1="72" x2="55" y2="72" stroke="#8b4513" stroke-width="1"/>
    <line x1="45" y1="98" x2="55" y2="98" stroke="#8b4513" stroke-width="1"/>
    <!-- Lantern glow -->
    <ellipse cx="50" cy="85" rx="8" ry="10" fill="#ff6b35" fill-opacity="0.2">
      <animate attributeName="fill-opacity" values="0.2;0.35;0.2" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="0" y="220" width="400" height="20" fill="#0a0500"/>
  <g stroke="#ffd700" stroke-opacity="0.15" stroke-width="1" fill="none">
    <line x1="0" y1="220" x2="400" y2="220"/>
    <line x1="0" y1="222" x2="400" y2="222"/>
  </g>

  <!-- Feature pills -->
  <g font-family="'Courier New', monospace" font-size="7">
    <rect x="140" y="185" width="50" height="16" rx="3" fill="#ff6b35" fill-opacity="0.08" stroke="#ff6b35" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="165" y="196" fill="#ff6b35" fill-opacity="0.6" text-anchor="middle">蔡李佛</text>
    
    <rect x="200" y="185" width="50" height="16" rx="3" fill="#ffd700" fill-opacity="0.06" stroke="#ffd700" stroke-opacity="0.2" stroke-width="0.8"/>
    <text x="225" y="196" fill="#ffd700" fill-opacity="0.5" text-anchor="middle">洪拳</text>
    
    <rect x="260" y="185" width="50" height="16" rx="3" fill="#ff6b35" fill-opacity="0.08" stroke="#ff6b35" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="285" y="196" fill="#ff6b35" fill-opacity="0.6" text-anchor="middle">咏春</text>
  </g>

  <!-- Tech stack -->
  <g font-family="'Courier New', monospace" font-size="6">
    <rect x="40" y="205" width="28" height="10" rx="2" fill="none" stroke="#ff6b35" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="54" y="213" fill="#ff6b35" fill-opacity="0.35" text-anchor="middle">React</text>
    
    <rect x="72" y="205" width="22" height="10" rx="2" fill="none" stroke="#ff6b35" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="83" y="213" fill="#ff6b35" fill-opacity="0.35" text-anchor="middle">TS</text>
    
    <rect x="98" y="205" width="28" height="10" rx="2" fill="none" stroke="#ffd700" stroke-opacity="0.12" stroke-width="0.5"/>
    <text x="112" y="213" fill="#ffd700" fill-opacity="0.3" text-anchor="middle">GSAP</text>
    
    <rect x="130" y="205" width="30" height="10" rx="2" fill="none" stroke="#ff6b35" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="145" y="213" fill="#ff6b35" fill-opacity="0.35" text-anchor="middle">CSS3</text>
  </g>

  <!-- Label -->
  <text x="20" y="240" font-family="'Courier New', monospace" font-size="9" fill="#ffd700" fill-opacity="0.6" letter-spacing="2">10 · GD MARTIAL ARTS</text>
  <text x="380" y="240" font-family="'Courier New', monospace" font-size="8" fill="#ffd700" fill-opacity="0.3" text-anchor="end">2026</text>

  <!-- Status badge -->
  <rect x="310" y="12" width="70" height="16" rx="3" fill="#ff6b35" fill-opacity="0.1" stroke="#ff6b35" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="345" y="23" font-family="'Courier New', monospace" font-size="7" fill="#ff6b35" fill-opacity="0.6" text-anchor="middle">DYNAMIC SITE</text>
</svg>
