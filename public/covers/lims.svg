<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="limsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#0f1a1a"/>
    </linearGradient>
    <linearGradient id="limsAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#limsBg)"/>

  <!-- Grid -->
  <g stroke="#00f0ff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
  </g>

  <!-- Central hub node -->
  <circle cx="200" cy="120" r="28" fill="#00f0ff" fill-opacity="0.05" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1.2"/>
  <text x="200" y="116" font-family="monospace" font-size="7" fill="#00f0ff" fill-opacity="0.7" text-anchor="middle">LAB</text>
  <text x="200" y="128" font-family="monospace" font-size="7" fill="#00f0ff" fill-opacity="0.7" text-anchor="middle">DB</text>

  <!-- DB icon in center -->
  <ellipse cx="200" cy="112" rx="12" ry="4" fill="none" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1"/>
  <path d="M188,112 L188,130 Q188,132 200,132 Q212,132 212,130 L212,112" fill="none" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1"/>
  <ellipse cx="200" cy="130" rx="12" ry="4" fill="none" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Branch lines to 4 modules -->
  <g stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1" fill="none">
    <!-- top -->
    <line x1="200" y1="92" x2="200" y2="60"/>
    <circle cx="200" cy="52" r="14" fill="#00f0ff" fill-opacity="0.06" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="200" y="56" font-family="monospace" font-size="6" fill="#00f0ff" fill-opacity="0.7" text-anchor="middle">USERS</text>

    <!-- bottom -->
    <line x1="200" y1="148" x2="200" y2="188"/>
    <circle cx="200" cy="196" r="14" fill="#00f0ff" fill-opacity="0.06" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="200" y="200" font-family="monospace" font-size="6" fill="#00f0ff" fill-opacity="0.7" text-anchor="middle">SAMPLE</text>

    <!-- left -->
    <line x1="172" y1="108" x2="130" y2="88"/>
    <circle cx="116" cy="80" r="14" fill="#00f0ff" fill-opacity="0.06" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="116" y="84" font-family="monospace" font-size="6" fill="#00f0ff" fill-opacity="0.7" text-anchor="middle">FLOW</text>

    <!-- right -->
    <line x1="228" y1="108" x2="270" y2="88"/>
    <circle cx="284" cy="80" r="14" fill="#00f0ff" fill-opacity="0.06" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="284" y="84" font-family="monospace" font-size="6" fill="#00f0ff" fill-opacity="0.7" text-anchor="middle">REPORT</text>
  </g>

  <!-- Side panel UI mock -->
  <rect x="290" y="140" width="90" height="70" rx="4" fill="#00f0ff" fill-opacity="0.04" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="298" y="150" width="40" height="5" rx="2" fill="#00f0ff" fill-opacity="0.3"/>
  <rect x="298" y="160" width="30" height="3" rx="1" fill="#00f0ff" fill-opacity="0.15"/>
  <rect x="298" y="167" width="50" height="3" rx="1" fill="#00f0ff" fill-opacity="0.15"/>
  <rect x="298" y="174" width="25" height="3" rx="1" fill="#00f0ff" fill-opacity="0.15"/>
  <rect x="298" y="185" width="74" height="16" rx="3" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="335" y="196" font-family="monospace" font-size="6" fill="#00f0ff" fill-opacity="0.6" text-anchor="middle">SUBMIT</text>

  <!-- Glow top -->
  <rect x="0" y="0" width="400" height="60" fill="url(#limsAccent)"/>

  <!-- Label -->
  <text x="20" y="220" font-family="monospace" font-size="9" fill="#00f0ff" fill-opacity="0.6" letter-spacing="2">02 · LIMS</text>
  <text x="380" y="228" font-family="monospace" font-size="8" fill="#00f0ff" fill-opacity="0.3" text-anchor="end">2025</text>
</svg>
