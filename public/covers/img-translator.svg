<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="imgTransBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a20"/>
      <stop offset="100%" stop-color="#102028"/>
    </linearGradient>
    <radialGradient id="imgTransGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="240" fill="url(#imgTransBg)"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="120" rx="160" ry="100" fill="url(#imgTransGlow)"/>

  <!-- Background grid -->
  <g stroke="#00d4ff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
  </g>

  <!-- Image frame left (source) -->
  <g filter="url(#softGlow)">
    <rect x="40" y="50" width="110" height="85" rx="6" fill="#0a1a25" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1.2"/>
    
    <!-- Stylized Chinese text/image content -->
    <rect x="48" y="58" width="40" height="30" rx="2" fill="#1a3040" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="68" y="77" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" fill-opacity="0.5" text-anchor="middle">中</text>
    
    <rect x="92" y="58" width="50" height="30" rx="2" fill="#1a3040" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="117" y="77" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" fill-opacity="0.5" text-anchor="middle">文</text>
    
    <rect x="48" y="92" width="94" height="12" rx="2" fill="#152535" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="0.5"/>
    <rect x="48" y="108" width="70" height="8" rx="1" fill="#152535" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="0.5"/>
    <rect x="48" y="120" width="85" height="8" rx="1" fill="#152535" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="0.5"/>
    
    <text x="95" y="148" font-family="'Courier New', monospace" font-size="7" fill="#00d4ff" fill-opacity="0.4" text-anchor="middle">SOURCE (CN)</text>
  </g>

  <!-- AI Translation arrow/processing -->
  <g filter="url(#strongGlow)">
    <!-- Processing neural network dots -->
    <g fill="#7c3aed" fill-opacity="0.6">
      <circle cx="175" cy="92" r="3"/>
      <circle cx="190" cy="80" r="2"/>
      <circle cx="210" cy="85" r="2.5"/>
      <circle cx="195" cy="100" r="2"/>
      <circle cx="220" cy="95" r="3"/>
      <!-- Connections -->
      <line x1="175" y1="92" x2="190" y2="80" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="0.8"/>
      <line x1="190" y1="80" x2="210" y2="85" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="0.8"/>
      <line x1="175" y1="92" x2="195" y2="100" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="0.8"/>
      <line x1="210" y1="85" x2="220" y2="95" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="0.8"/>
    </g>
    
    <!-- Animated particles flowing -->
    <circle cx="160" cy="92" r="2" fill="#00d4ff" fill-opacity="0.8">
      <animate attributeName="cx" values="160;220;160" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="85" r="1.5" fill="#7c3aed" fill-opacity="0.6">
      <animate attributeName="cx" values="165;225;165" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="100" r="1.5" fill="#00d4ff" fill-opacity="0.7">
      <animate attributeName="cx" values="170;230;170" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow -->
  <line x1="158" y1="92" x2="235" y2="92" stroke="url(#accentGrad)" stroke-width="2" stroke-opacity="0.6"/>
  <polyline points="230,87 238,92 230,97" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.6" filter="url(#softGlow)"/>
  <text x="198" y="85" font-family="'Courier New', monospace" font-size="6" fill="#7c3aed" fill-opacity="0.5" text-anchor="middle">AI TRANSLATE</text>

  <!-- Image frame right (translated) -->
  <g filter="url(#softGlow)">
    <rect x="250" y="50" width="110" height="85" rx="6" fill="#0a1a25" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.2"/>
    
    <!-- Stylized English text/image content -->
    <rect x="258" y="58" width="40" height="30" rx="2" fill="#1a1a35" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="278" y="77" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed" fill-opacity="0.5" text-anchor="middle">EN</text>
    
    <rect x="302" y="58" width="50" height="30" rx="2" fill="#1a1a35" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="327" y="77" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed" fill-opacity="0.5" text-anchor="middle">文</text>
    
    <rect x="258" y="92" width="94" height="12" rx="2" fill="#15152a" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="0.5"/>
    <rect x="258" y="108" width="70" height="8" rx="1" fill="#15152a" stroke="#7c3aed" stroke-opacity="0.1" stroke-width="0.5"/>
    <rect x="258" y="120" width="85" height="8" rx="1" fill="#15152a" stroke="#7c3aed" stroke-opacity="0.1" stroke-width="0.5"/>
    
    <text x="305" y="148" font-family="'Courier New', monospace" font-size="7" fill="#7c3aed" fill-opacity="0.4" text-anchor="middle">TRANSLATED (EN)</text>
  </g>

  <!-- Bottom panel - features -->
  <g font-family="'Courier New', monospace">
    <!-- OCR recognition -->
    <rect x="40" y="165" width="80" height="22" rx="4" fill="#00d4ff" fill-opacity="0.06" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="0.8"/>
    <circle cx="55" cy="176" r="4" fill="#00d4ff" fill-opacity="0.5"/>
    <text x="62" y="179" font-size="7" fill="#00d4ff" fill-opacity="0.6">OCR</text>
    
    <!-- Neural translate -->
    <rect x="130" y="165" width="80" height="22" rx="4" fill="#7c3aed" fill-opacity="0.06" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="0.8"/>
    <circle cx="145" cy="176" r="4" fill="#7c3aed" fill-opacity="0.5"/>
    <text x="152" y="179" font-size="7" fill="#7c3aed" fill-opacity="0.6">NEURAL</text>
    
    <!-- Image preserve -->
    <rect x="220" y="165" width="80" height="22" rx="4" fill="#00d4ff" fill-opacity="0.06" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="0.8"/>
    <circle cx="235" cy="176" r="4" fill="#00d4ff" fill-opacity="0.5"/>
    <text x="242" y="179" font-size="7" fill="#00d4ff" fill-opacity="0.6">LAYERS</text>
    
    <!-- Export -->
    <rect x="310" y="165" width="60" height="22" rx="4" fill="#7c3aed" fill-opacity="0.06" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="0.8"/>
    <circle cx="325" cy="176" r="4" fill="#7c3aed" fill-opacity="0.5"/>
    <text x="332" y="179" font-size="7" fill="#7c3aed" fill-opacity="0.6">EXPORT</text>
  </g>

  <!-- Tech stack pills -->
  <g font-family="'Courier New', monospace" font-size="6">
    <rect x="40" y="200" width="28" height="12" rx="2" fill="none" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="54" y="209" fill="#00d4ff" fill-opacity="0.35" text-anchor="middle">Python</text>
    
    <rect x="72" y="200" width="24" height="12" rx="2" fill="none" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="84" y="209" fill="#00d4ff" fill-opacity="0.35" text-anchor="middle">EasyOCR</text>
    
    <rect x="100" y="200" width="30" height="12" rx="2" fill="none" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="115" y="209" fill="#7c3aed" fill-opacity="0.35" text-anchor="middle">NLLB</text>
    
    <rect x="134" y="200" width="36" height="12" rx="2" fill="none" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="152" y="209" fill="#7c3aed" fill-opacity="0.35" text-anchor="middle">React</text>
    
    <rect x="174" y="200" width="24" height="12" rx="2" fill="none" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="0.5"/>
    <text x="186" y="209" fill="#00d4ff" fill-opacity="0.35" text-anchor="middle">PIL</text>
  </g>

  <!-- Label -->
  <text x="20" y="230" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" fill-opacity="0.6" letter-spacing="2">09 · IMG TRANSLATOR</text>
  <text x="380" y="230" font-family="'Courier New', monospace" font-size="8" fill="#00d4ff" fill-opacity="0.3" text-anchor="end">2026</text>

  <!-- Status badge -->
  <rect x="310" y="12" width="70" height="16" rx="3" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="345" y="23" font-family="'Courier New', monospace" font-size="7" fill="#00d4ff" fill-opacity="0.6" text-anchor="middle">AI TOOL</text>
</svg>
