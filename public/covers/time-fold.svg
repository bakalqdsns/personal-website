<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <defs>
    <linearGradient id="tfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="50%" stop-color="#0f1a3d"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <radialGradient id="tfGlowCyan" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tfGlowPurple" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="240" fill="url(#tfBg)"/>
  <rect width="480" height="240" fill="url(#tfGlowCyan)"/>
  <rect width="480" height="240" fill="url(#tfGlowPurple)"/>

  <!-- Three stacked time-layers as horizontal bands -->
  <rect x="0" y="32" width="480" height="56" fill="#0c1840" opacity="0.85"/>
  <rect x="0" y="96" width="480" height="56" fill="#100828" opacity="0.9"/>
  <rect x="0" y="160" width="480" height="80" fill="#0a0612" opacity="0.95"/>

  <!-- 24H layer: tall buildings, dense windows -->
  <g fill="#1a2858" stroke="#00f0ff" stroke-opacity="0.7" stroke-width="1">
    <rect x="20" y="40" width="34" height="38" rx="1.5"/>
    <rect x="58" y="32" width="42" height="46" rx="1.5"/>
    <rect x="104" y="38" width="36" height="40" rx="1.5"/>
    <rect x="144" y="28" width="48" height="50" rx="1.5"/>
    <rect x="196" y="34" width="40" height="44" rx="1.5"/>
    <rect x="240" y="30" width="44" height="48" rx="1.5"/>
    <rect x="288" y="36" width="38" height="42" rx="1.5"/>
    <rect x="330" y="32" width="48" height="46" rx="1.5"/>
    <rect x="382" y="38" width="40" height="40" rx="1.5"/>
    <rect x="426" y="34" width="34" height="44" rx="1.5"/>
  </g>
  <g fill="#7df9ff">
    <rect x="28" y="48" width="3" height="3"/>
    <rect x="36" y="48" width="3" height="3"/>
    <rect x="28" y="56" width="3" height="3"/>
    <rect x="36" y="56" width="3" height="3"/>
    <rect x="68" y="42" width="3" height="3"/>
    <rect x="76" y="42" width="3" height="3"/>
    <rect x="68" y="50" width="3" height="3"/>
    <rect x="76" y="50" width="3" height="3"/>
    <rect x="114" y="46" width="3" height="3"/>
    <rect x="124" y="46" width="3" height="3"/>
    <rect x="154" y="38" width="3" height="3"/>
    <rect x="164" y="38" width="3" height="3"/>
    <rect x="174" y="38" width="3" height="3"/>
    <rect x="154" y="46" width="3" height="3"/>
    <rect x="174" y="46" width="3" height="3"/>
    <rect x="206" y="44" width="3" height="3"/>
    <rect x="216" y="44" width="3" height="3"/>
    <rect x="250" y="38" width="3" height="3"/>
    <rect x="260" y="38" width="3" height="3"/>
    <rect x="270" y="38" width="3" height="3"/>
    <rect x="338" y="42" width="3" height="3"/>
    <rect x="350" y="42" width="3" height="3"/>
    <rect x="360" y="42" width="3" height="3"/>
    <rect x="392" y="44" width="3" height="3"/>
  </g>
  <text x="450" y="60" font-family="monospace" font-size="14" fill="#7df9ff" font-weight="bold" text-anchor="end" letter-spacing="1">24H</text>

  <line x1="0" y1="92" x2="480" y2="92" stroke="#00f0ff" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- 16H layer: jagged cut band -->
  <g fill="#241640" stroke="#a855f7" stroke-opacity="0.65" stroke-width="1">
    <rect x="20" y="108" width="34" height="38" rx="1.5"/>
    <rect x="58" y="100" width="42" height="46" rx="1.5"/>
    <rect x="104" y="106" width="36" height="40" rx="1.5"/>
    <rect x="144" y="98" width="48" height="48" rx="1.5"/>
    <rect x="196" y="104" width="40" height="42" rx="1.5"/>
    <rect x="240" y="100" width="44" height="46" rx="1.5"/>
    <rect x="288" y="106" width="38" height="40" rx="1.5"/>
    <rect x="330" y="98" width="48" height="48" rx="1.5"/>
    <rect x="382" y="106" width="40" height="40" rx="1.5"/>
    <rect x="426" y="100" width="34" height="46" rx="1.5"/>
  </g>
  <g fill="#c4a8ff">
    <rect x="66" y="108" width="3" height="3"/>
    <rect x="76" y="108" width="3" height="3"/>
    <rect x="154" y="106" width="3" height="3"/>
    <rect x="166" y="106" width="3" height="3"/>
    <rect x="248" y="110" width="3" height="3"/>
    <rect x="338" y="106" width="3" height="3"/>
    <rect x="350" y="106" width="3" height="3"/>
  </g>
  <polyline points="60,152 90,148 110,158 130,146 150,155 170,144 190,156 210,142" fill="none" stroke="#ff3860" stroke-opacity="0.85" stroke-width="2"/>
  <text x="450" y="124" font-family="monospace" font-size="14" fill="#c4a8ff" font-weight="bold" text-anchor="end" letter-spacing="1">16H</text>

  <line x1="0" y1="156" x2="480" y2="156" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 8H layer: amber sparse at night -->
  <g fill="#1a1018" stroke="#fbbf24" stroke-opacity="0.55" stroke-width="1">
    <rect x="24" y="178" width="42" height="56" rx="1.5"/>
    <rect x="70" y="168" width="40" height="64" rx="1.5"/>
    <rect x="114" y="184" width="34" height="48" rx="1.5"/>
    <rect x="152" y="172" width="48" height="60" rx="1.5"/>
    <rect x="204" y="182" width="40" height="52" rx="1.5"/>
    <rect x="248" y="176" width="46" height="58" rx="1.5"/>
    <rect x="298" y="184" width="36" height="48" rx="1.5"/>
    <rect x="338" y="174" width="48" height="58" rx="1.5"/>
    <rect x="390" y="180" width="38" height="52" rx="1.5"/>
    <rect x="432" y="176" width="32" height="56" rx="1.5"/>
  </g>
  <g fill="#fbbf24">
    <rect x="34" y="220" width="4" height="4"/>
    <rect x="42" y="220" width="4" height="4"/>
    <rect x="78" y="216" width="4" height="4"/>
    <rect x="88" y="216" width="4" height="4"/>
    <rect x="164" y="218" width="4" height="4"/>
    <rect x="174" y="218" width="4" height="4"/>
    <rect x="260" y="220" width="4" height="4"/>
    <rect x="270" y="220" width="4" height="4"/>
    <rect x="348" y="222" width="4" height="4"/>
    <rect x="360" y="222" width="4" height="4"/>
    <rect x="400" y="220" width="4" height="4"/>
