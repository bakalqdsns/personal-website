  <text x="450" y="186" font-family="monospace" font-size="14" fill="#fbbf24" font-weight="bold" text-anchor="end" letter-spacing="1">8H</text>

  <!-- HUD labels -->
  <text x="14" y="20" font-family="monospace" font-size="9" fill="#00f0ff" fill-opacity="0.85" letter-spacing="2" font-weight="bold">TIME FOLD</text>
  <text x="14" y="232" font-family="monospace" font-size="6" fill="#7df9ff" fill-opacity="0.5" letter-spacing="1">SEEDANCE 2.0</text>
  <text x="466" y="232" font-family="monospace" font-size="6" fill="#ff3860" fill-opacity="0.7" text-anchor="end" letter-spacing="1">DYSTOPIAN</text>
</svg>