<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <defs>
    <linearGradient id="hdBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b1d10"/>
      <stop offset="50%" stop-color="#1f1408"/>
      <stop offset="100%" stop-color="#0e0905"/>
    </linearGradient>
    <radialGradient id="hdWarm" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#ffb86b" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffb86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="240" fill="url(#hdBg)"/>
  <rect width="480" height="240" fill="url(#hdWarm)"/>

  <!-- Bridge ceiling -->
  <rect x="0" y="0" width="480" height="60" fill="#0a0604"/>
  <rect x="0" y="50" width="480" height="14" fill="#0e0805"/>

  <!-- Pillars -->
  <rect x="10" y="44" width="20" height="170" fill="#1a1108"/>
  <rect x="450" y="44" width="20" height="170" fill="#1a1108"/>

  <!-- Wet floor with reflection -->
  <rect x="0" y="180" width="480" height="60" fill="#0a0805"/>
  <ellipse cx="240" cy="215" rx="60" ry="2" fill="#ffb86b" fill-opacity="0.18"/>

  <!-- Barber shop exterior -->
  <rect x="160" y="78" width="160" height="106" fill="#1f1408" stroke="#c4864a" stroke-opacity="0.55" stroke-width="1"/>

  <!-- Sign board -->
  <rect x="168" y="82" width="144" height="28" rx="2" fill="#2a1c0d" stroke="#ffb86b" stroke-opacity="0.7" stroke-width="1.2"/>
  <text x="240" y="100" font-family="monospace" font-size="9" fill="#ffb86b" font-weight="bold" text-anchor="middle" letter-spacing="3">BARBER</text>

  <!-- Interior warm light -->
  <rect x="165" y="113" width="150" height="68" fill="#3a2410" opacity="0.8"/>
  <ellipse cx="240" cy="150" rx="70" ry="40" fill="#ffb86b" fill-opacity="0.25"/>

  <!-- Mirror -->
  <rect x="218" y="115" width="44" height="40" rx="2" fill="#1a1108" stroke="#ffb86b" stroke-opacity="0.7" stroke-width="1.2"/>

  <!-- Barber chair silhouette -->
  <rect x="226" y="155" width="28" height="22" rx="6" fill="#0a0604" stroke="#c4864a" stroke-opacity="0.45" stroke-width="0.6"/>

  <!-- Customer silhouette -->
  <ellipse cx="240" cy="135" rx="9" ry="9" fill="#1a1108" stroke="#c4864a" stroke-opacity="0.4" stroke-width="0.6"/>

  <!-- Hanging light bulb glow -->
  <line x1="240" y1="60" x2="240" y2="68" stroke="#1a1108" stroke-width="1.4"/>
  <circle cx="240" cy="73" r="9" fill="#ffb86b" fill-opacity="0.45"/>
  <circle cx="240" cy="73" r="4" fill="#fff3c4"/>
  <polygon points="226,73 254,73 270,180 210,180" fill="#ffb86b" fill-opacity="0.08"/>

  <!-- HUD -->
  <text x="14" y="20" font-family="monospace" font-size="9" fill="#ffb86b" fill-opacity="0.9" letter-spacing="2" font-weight="bold">OLD STREET</text>
  <text x="14" y="232" font-family="monospace" font-size="6" fill="#c4864a" fill-opacity="0.55" letter-spacing="1">SHAOGUAN ALLEY</text>
  <text x="466" y="232" font-family="monospace" font-size="6" fill="#ffb86b" fill-opacity="0.75" text-anchor="end" letter-spacing="1">DOCUMENTARY</text>
</svg>