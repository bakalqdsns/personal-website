<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="aniBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#100a1a"/>
    </linearGradient>
    <linearGradient id="aniAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="aniGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="240" fill="url(#aniBg)"/>

  <!-- Grid -->
  <g stroke="#f472b6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
  </g>

  <!-- Phone outline -->
  <rect x="145" y="35" width="110" height="190" rx="14" fill="#f472b6" fill-opacity="0.04" stroke="#f472b6" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Notch -->
  <rect x="180" y="35" width="40" height="8" rx="4" fill="#0a0a10" stroke="#f472b6" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Screen content -->
  <rect x="153" y="52" width="94" height="156" rx="4" fill="#f472b6" fill-opacity="0.05"/>

  <!-- Header -->
  <rect x="153" y="52" width="94" height="28" rx="4" fill="#f472b6" fill-opacity="0.08"/>
  <circle cx="170" cy="66" r="10" fill="#f472b6" fill-opacity="0.15" stroke="#f472b6" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Cat ears on avatar -->
  <polygon points="164,58 170,52 176,58" fill="#f472b6" fill-opacity="0.4"/>
  <rect x="185" y="60" width="40" height="4" rx="2" fill="#f472b6" fill-opacity="0.3"/>
  <rect x="185" y="67" width="28" height="3" rx="1" fill="#f472b6" fill-opacity="0.15"/>

  <!-- Task list items -->
  <g fill="#f472b6">
    <rect x="160" y="90" width="80" height="14" rx="4" fill="#f472b6" fill-opacity="0.12" stroke="#f472b6" stroke-opacity="0.3" stroke-width="0.8"/>
    <rect x="165" y="95" width="40" height="4" rx="2" fill="#f472b6" fill-opacity="0.35"/>
    <!-- Checkmark circle -->
    <circle cx="232" cy="97" r="6" fill="#f472b6" fill-opacity="0.25" stroke="#f472b6" stroke-opacity="0.5" stroke-width="0.8"/>
    <path d="M229,97 L231,99 L236,94" stroke="#f472b6" stroke-opacity="0.8" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <rect x="160" y="110" width="80" height="14" rx="4" fill="#f472b6" fill-opacity="0.12" stroke="#f472b6" stroke-opacity="0.3" stroke-width="0.8"/>
    <rect x="165" y="115" width="50" height="4" rx="2" fill="#f472b6" fill-opacity="0.35"/>
    <circle cx="232" cy="117" r="6" fill="#f472b6" fill-opacity="0.25" stroke="#f472b6" stroke-opacity="0.5" stroke-width="0.8"/>
    <path d="M229,117 L231,119 L236,114" stroke="#f472b6" stroke-opacity="0.8" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Active item (pink glow) -->
    <rect x="160" y="130" width="80" height="14" rx="4" fill="#f472b6" fill-opacity="0.18" stroke="#f472b6" stroke-opacity="0.6" stroke-width="1" filter="url(#aniGlow)"/>
    <rect x="165" y="135" width="35" height="4" rx="2" fill="#f472b6" fill-opacity="0.5"/>
    <circle cx="232" cy="137" r="6" fill="#f472b6" fill-opacity="0.35" stroke="#f472b6" stroke-opacity="0.7" stroke-width="1"/>
  </g>

  <!-- Study timer bar -->
  <rect x="160" y="155" width="80" height="8" rx="4" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.2" stroke-width="0.8"/>
  <rect x="160" y="155" width="52" height="8" rx="4" fill="#f472b6" fill-opacity="0.35"/>
  <text x="200" y="162" font-family="monospace" font-size="5" fill="#f472b6" fill-opacity="0.8" text-anchor="middle">02:34:18</text>

  <!-- Bottom nav -->
  <rect x="153" y="192" width="94" height="16" rx="4" fill="#f472b6" fill-opacity="0.06"/>
  <circle cx="175" cy="200" r="4" fill="#f472b6" fill-opacity="0.5"/>
  <circle cx="200" cy="200" r="4" fill="#f472b6" fill-opacity="0.2"/>
  <circle cx="225" cy="200" r="4" fill="#f472b6" fill-opacity="0.2"/>

  <!-- Sparkles -->
  <g fill="#f472b6" filter="url(#aniGlow)">
    <polygon points="100,80 103,87 110,87 104,92 107,100 100,95 93,100 96,92 90,87 97,87" transform="scale(0.5) translate(100, 60)"/>
    <polygon points="100,80 103,87 110,87 104,92 107,100 100,95 93,100 96,92 90,87 97,87" transform="scale(0.4) translate(870, 180)"/>
    <polygon points="100,80 103,87 110,87 104,92 107,100 100,95 93,100 96,92 90,87 97,87" transform="scale(0.35) translate(60, 350)"/>
  </g>

  <!-- Floating badge -->
  <rect x="290" y="60" width="80" height="30" rx="6" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="298" y="68" width="45" height="4" rx="2" fill="#f472b6" fill-opacity="0.4"/>
  <rect x="298" y="76" width="30" height="3" rx="1" fill="#f472b6" fill-opacity="0.2"/>
  <circle cx="360" cy="75" r="10" fill="#f472b6" fill-opacity="0.2" stroke="#f472b6" stroke-opacity="0.5" stroke-width="1"/>
  <text x="360" y="79" font-family="monospace" font-size="7" fill="#f472b6" fill-opacity="0.9" text-anchor="middle">+1</text>

  <!-- Glow top -->
  <rect x="0" y="0" width="400" height="60" fill="url(#aniAccent)"/>

  <!-- Label -->
  <text x="20" y="220" font-family="monospace" font-size="9" fill="#f472b6" fill-opacity="0.6" letter-spacing="2">05 � ANIFOCUS</text>
  <text x="380" y="228" font-family="monospace" font-size="8" fill="#f472b6" fill-opacity="0.3" text-anchor="end">2025</text>
</svg>
